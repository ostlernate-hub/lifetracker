<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" fill="#020008"/>

  <!-- Perspective grid floor (bottom half) -->
  <!-- Horizontal lines -->
  <line x1="0" y1="512" x2="512" y2="512" stroke="#7e22ce" stroke-width="2"/>
  <line x1="0" y1="490" x2="512" y2="490" stroke="#7e22ce" stroke-width="1.8"/>
  <line x1="0" y1="468" x2="512" y2="468" stroke="#7e22ce" stroke-width="1.5"/>
  <line x1="0" y1="447" x2="512" y2="447" stroke="#7e22ce" stroke-width="1.3"/>
  <line x1="0" y1="427" x2="512" y2="427" stroke="#7e22ce" stroke-width="1.1"/>
  <line x1="0" y1="408" x2="512" y2="408" stroke="#6B21A8" stroke-width="1"/>
  <line x1="0" y1="391" x2="512" y2="391" stroke="#6B21A8" stroke-width="0.9"/>
  <line x1="0" y1="375" x2="512" y2="375" stroke="#6B21A8" stroke-width="0.8"/>
  <line x1="0" y1="361" x2="512" y2="361" stroke="#581c87" stroke-width="0.7"/>
  <line x1="0" y1="348" x2="512" y2="348" stroke="#581c87" stroke-width="0.6"/>
  <line x1="0" y1="336" x2="512" y2="336" stroke="#581c87" stroke-width="0.5"/>
  <line x1="0" y1="325" x2="512" y2="325" stroke="#3b0764" stroke-width="0.4"/>
  <line x1="0" y1="315" x2="512" y2="315" stroke="#3b0764" stroke-width="0.35"/>
  <line x1="0" y1="306" x2="512" y2="306" stroke="#3b0764" stroke-width="0.3"/>
  <line x1="0" y1="298" x2="512" y2="298" stroke="#3b0764" stroke-width="0.25"/>
  <line x1="0" y1="290" x2="512" y2="290" stroke="#3b0764" stroke-width="0.2"/>
  <line x1="0" y1="283" x2="512" y2="283" stroke="#3b0764" stroke-width="0.2"/>
  <line x1="0" y1="277" x2="512" y2="277" stroke="#3b0764" stroke-width="0.15"/>
  <line x1="0" y1="271" x2="512" y2="271" stroke="#3b0764" stroke-width="0.15"/>
  <line x1="0" y1="265" x2="512" y2="265" stroke="#3b0764" stroke-width="0.1"/>
  <!-- Vertical perspective lines converging to vanishing point (256, 260) -->
  <line x1="256" y1="260" x2="0"   y2="512" stroke="#7e22ce" stroke-width="1.8"/>
  <line x1="256" y1="260" x2="52"  y2="512" stroke="#7e22ce" stroke-width="1.5"/>
  <line x1="256" y1="260" x2="103" y2="512" stroke="#7e22ce" stroke-width="1.2"/>
  <line x1="256" y1="260" x2="154" y2="512" stroke="#7e22ce" stroke-width="1"/>
  <line x1="256" y1="260" x2="205" y2="512" stroke="#7e22ce" stroke-width="0.8"/>
  <line x1="256" y1="260" x2="256" y2="512" stroke="#A855F7" stroke-width="1.8"/>
  <line x1="256" y1="260" x2="307" y2="512" stroke="#7e22ce" stroke-width="0.8"/>
  <line x1="256" y1="260" x2="358" y2="512" stroke="#7e22ce" stroke-width="1"/>
  <line x1="256" y1="260" x2="409" y2="512" stroke="#7e22ce" stroke-width="1.2"/>
  <line x1="256" y1="260" x2="460" y2="512" stroke="#7e22ce" stroke-width="1.5"/>
  <line x1="256" y1="260" x2="512" y2="512" stroke="#7e22ce" stroke-width="1.8"/>

  <!-- Horizon glow -->
  <rect x="0" y="257" width="512" height="6" fill="#A855F7" opacity="0.5"/>
  <rect x="0" y="259" width="512" height="3" fill="#D946EF" opacity="0.7"/>

  <!-- Sky cover -->
  <rect x="0" y="0" width="512" height="262" fill="#020008"/>

  <!-- LEVEL text — shadow -->
  <text x="258" y="148" text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="108" font-weight="900"
    fill="#7e22ce" opacity="0.7"
    letter-spacing="-2">LEVEL</text>
  <!-- LEVEL text — main -->
  <text x="256" y="145" text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="108" font-weight="900"
    fill="#A855F7"
    letter-spacing="-2">LEVEL</text>
  <!-- LEVEL highlight -->
  <text x="256" y="145" text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="108" font-weight="900"
    fill="#D946EF" opacity="0.3"
    letter-spacing="-2">LEVEL</text>

  <!-- UP! text — shadow -->
  <text x="258" y="252" text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="108" font-weight="900"
    fill="#7e22ce" opacity="0.7"
    letter-spacing="-2">UP!</text>
  <!-- UP! text — main -->
  <text x="256" y="249" text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="108" font-weight="900"
    fill="#A855F7"
    letter-spacing="-2">UP!</text>
  <!-- UP! highlight -->
  <text x="256" y="249" text-anchor="middle"
    font-family="'Courier New', monospace"
    font-size="108" font-weight="900"
    fill="#D946EF" opacity="0.3"
    letter-spacing="-2">UP!</text>

  <!-- Gold 4-point star -->
  <g transform="translate(78, 210)">
    <path d="M0,-26 L6,-6 L26,0 L6,6 L0,26 L-6,6 L-26,0 L-6,-6 Z" fill="#FBBF24"/>
    <path d="M0,-14 L3,-3 L14,0 L3,3 L0,14 L-3,3 L-14,0 L-3,-3 Z" fill="#FEF08A"/>
  </g>
</svg>
